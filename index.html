<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Kenangan Kelas X.3 SMAN 1 Cidahu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 3rem 0; border-radius: 0 0 2rem 2rem; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-bottom: 2rem; }
        .gallery-item { break-inside: avoid; margin-bottom: 1.5rem; }
        .masonry-grid { column-count: 1; column-gap: 1.5rem; }
        @media (min-width: 768px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 992px) { .masonry-grid { column-count: 3; } }
        .card { border: none; border-radius: 15px; overflow: hidden; transition: transform 0.3s ease, box-shadow 0.3s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 12px 24px rgba(0,0,0,0.15); z-index: 1; }
        .card-img-top { object-fit: cover; border-bottom: 3px solid #667eea; }
        .upload-section { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .loading { display: none; text-align: center; margin: 1rem 0; }
    </style>
</head>
<body>

<div class="hero text-center">
    <div class="container">
        <h1 class="display-4 fw-bold">Memori X.3 📸</h1>
        <p class="lead">SMAN 1 Cidahu - Angkatan Hebat</p>
    </div>
</div>

<div class="container">
    <div class="row justify-content-center mb-5">
        <div class="col-md-8">
            <div class="upload-section">
                <h4 class="mb-4 text-center">Bagikan Momenmu!</h4>
                <form id="uploadForm">
                    <div class="mb-3">
                        <label class="form-label">Nama Kamu</label>
                        <input type="text" class="form-control" id="namaSiswa" required placeholder="Contoh: Budi Santoso">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Pesan / Kesan</label>
                        <textarea class="form-control" id="pesanSiswa" rows="2" required placeholder="Tulis sesuatu untuk kelas kita..."></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Pilih Foto Terbaikmu</label>
                        <input type="file" class="form-control" id="fileFoto" accept="image/*" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100" id="btnSubmit">Unggah ke Album</button>
                </form>
                <div class="loading" id="loadingDiv">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2 text-muted">Sedang mengunggah foto ke mesin... (Bisa memakan waktu 10-20 detik)</p>
                </div>
            </div>
        </div>
    </div>

    <h3 class="mb-4 border-bottom pb-2">Galeri Teman-Teman</h3>
    <div class="masonry-grid" id="galleryContainer">
        <p class="text-center text-muted" id="statusGaleri">Memuat foto...</p>
    </div>
</div>

<script>
    // MASUKKAN URL APPS SCRIPT ANDA DI SINI
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwKYKDL3sINlftZe58dx0V0ajELgKupFRpV5yfAre8XKTbYNlh_jTFyXUWglH-NpMYD_g/exec'; 

    // Fungsi memuat data galeri saat halaman dibuka
    async function loadGallery() {
        const container = document.getElementById('galleryContainer');
        const status = document.getElementById('statusGaleri');
        
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            
            container.innerHTML = ''; // Bersihkan container
            
            if(data.length <= 1) { // Hanya ada baris kosong
                container.innerHTML = '<p class="text-center text-muted">Belum ada foto. Jadilah yang pertama!</p>';
                return;
            }

            // Membaca data dari baris ke-1 (melewati baris judul jika ada)
            for(let i = data.length - 1; i > 0; i--) { 
                let nama = data[i][1];
                let pesan = data[i][2];
                let urlFoto = data[i][3];

                if(nama && urlFoto) {
                    let cardHtml = `
                    <div class="gallery-item">
                        <div class="card">
                            <img src="${urlFoto}" class="card-img-top" alt="Foto ${nama}" loading="lazy">
                            <div class="card-body">
                                <h5 class="card-title fw-bold">${nama}</h5>
                                <p class="card-text text-muted">"${pesan}"</p>
                            </div>
                        </div>
                    </div>`;
                    container.innerHTML += cardHtml;
                }
            }
        } catch (error) {
            status.innerHTML = 'Gagal memuat galeri. Pastikan URL Script benar.';
        }
    }

    // Fungsi Mengunggah Foto
    document.getElementById('uploadForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const file = document.getElementById('fileFoto').files[0];
        const btnSubmit = document.getElementById('btnSubmit');
        const loadingDiv = document.getElementById('loadingDiv');
        
        if (file.size > 3000000) { // Batas 3MB agar script tidak timeout
            alert('Ukuran foto maksimal 3MB!');
            return;
        }

        btnSubmit.style.display = 'none';
        loadingDiv.style.display = 'block';

        const reader = new FileReader();
        reader.onload = function(event) {
            const base64Data = event.target.result;
            
            const payload = {
                nama: document.getElementById('namaSiswa').value,
                pesan: document.getElementById('pesanSiswa').value,
                mimeType: file.type,
                base64: base64Data
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload),
                mode: 'no-cors' // Penting untuk melewati blokir browser [cite: 182, 183]
            }).then(() => {
                alert('Berhasil diunggah! Halaman akan dimuat ulang.');
                document.getElementById('uploadForm').reset();
                window.location.reload();
            }).catch(error => {
                alert('Terjadi kesalahan saat mengunggah.');
                btnSubmit.style.display = 'block';
                loadingDiv.style.display = 'none';
            });
        };
        reader.readAsDataURL(file);
    });

    // Panggil fungsi muat galeri
    window.onload = loadGallery;
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
