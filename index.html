<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Kenangan Kelas X.3 SMAN 1 Cidahu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); color: white; padding: 3.5rem 0; border-radius: 0 0 2.5rem 2.5rem; box-shadow: 0 10px 25px rgba(79, 70, 229, 0.15); margin-bottom: 2.5rem; }
        .upload-section { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.05); }
        
        /* Grid Masonry Ringan */
        .masonry-grid { column-count: 1; column-gap: 1.5rem; }
        @media (min-width: 768px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 992px) { .masonry-grid { column-count: 3; } }
        
        .gallery-item { break-inside: avoid; margin-bottom: 1.5rem; }
        .card { border: none; border-radius: 18px; overflow: hidden; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 5px 15px rgba(0,0,0,0.04); background: white; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.12); }
        
        /* Wrapper Thumbnail Gambar Mini */
        .img-container { width: 100%; height: 240px; overflow: hidden; position: relative; background-color: #eaeaea; cursor: pointer; }
        .img-thumbnail-custom { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .card:hover .img-thumbnail-custom { transform: scale(1.06); }
        
        /* Badge Zoom Efek */
        .zoom-badge { position: absolute; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.5); color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; backdrop-filter: blur(4px); opacity: 0; transition: opacity 0.3s ease; }
        .img-container:hover .zoom-badge { opacity: 1; }
        
        /* Desain Tombol Reaksi Interaktif */
        .reaction-bar { display: flex; justify-content: space-around; padding: 0.75rem; border-top: 1px solid #f1f5f9; background: #fafafa; }
        .reaction-btn { border: none; background: transparent; padding: 5px 12px; border-radius: 30px; transition: all 0.2s; font-size: 0.95rem; display: inline-flex; align-items: center; gap: 6px; color: #475569; }
        .reaction-btn:hover { background: #f1f5f9; transform: scale(1.1); }
        .reaction-btn:active { transform: scale(0.95); }
        .reaction-btn.reacted-thumb { color: #2563eb; font-weight: bold; }
        .reaction-btn.reacted-love { color: #dc2626; font-weight: bold; }
        .reaction-btn.reacted-star { color: #ca8a04; font-weight: bold; }
        
        .loading { display: none; text-align: center; margin: 1rem 0; }
        .modal-content { border-radius: 20px; border: none; overflow: hidden; }
    </style>
</head>
<body>

<div class="hero text-center">
    <div class="container">
        <h1 class="display-5 fw-bold">Memori Interaktif X.3 📸</h1>
        <p class="lead opacity-90">SMAN 1 Cidahu — Ruang Kenangan Ringan & Cepat</p>
    </div>
</div>

<div class="container mb-5">
    <!-- Form Unggah -->
    <div class="row justify-content-center mb-5">
        <div class="col-md-8">
            <div class="upload-section">
                <h4 class="mb-4 text-center fw-bold text-dark">Bagikan Momen Terbaikmu!</h4>
                <form id="uploadForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nama Lengkap</label>
                        <input type="text" class="form-control form-control-lg" id="namaSiswa" required placeholder="Misal: Budi Santoso">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Kesan / Pesan Singkat</label>
                        <textarea class="form-control" id="pesanSiswa" rows="2" required placeholder="Tuliskan memori paling berkesan di kelas X.3..."></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Pilih Foto (Maks 3MB)</label>
                        <input type="file" class="form-control" id="fileFoto" accept="image/*" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold" id="btnSubmit">Unggah Sekarang</button>
                </form>
                <div class="loading" id="loadingDiv">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2 text-muted small">Sedang mengompresi dan mengirim foto ke Google Drive...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Area Galeri -->
    <h3 class="mb-4 fw-bold text-secondary border-bottom pb-2">Galeri Kenangan</h3>
    <div class="masonry-grid" id="galleryContainer">
        <p class="text-center text-muted" id="statusGaleri">Menghubungkan ke database Sheets...</p>
    </div>
</div>

<!-- Jendela Pop-up Modal untuk Gambar Ukuran Asli (Lightbox) -->
<div class="modal fade" id="lightboxModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content bg-transparent shadow-none">
            <div class="modal-body p-0 text-center position-relative">
                <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Close" style="z-index: 999; filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.8));"></button>
                <img src="" id="lightboxImage" class="img-fluid rounded shadow-lg" style="max-height: 85vh; background-color: #000;">
                <div id="lightboxCaption" class="text-white mt-3 p-2 rounded" style="background: rgba(0,0,0,0.6); display: inline-block;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // WAJIB: GANTI DENGAN URL WEB APP GOOGLE APPS SCRIPT ANDA
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyXr83gmw8hpoSztfVth12PT06Km6oPrh4bahdNkkv0jva3kzu4X99rv11VrxULbh63gQ/exec'; 

    // Fungsi memuat galeri secara berkala & ringan
    async function loadGallery() {
        const container = document.getElementById('galleryContainer');
        const status = document.getElementById('statusGaleri');
        
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            container.innerHTML = '';
            
            if(!data || data.length <= 1) { 
                container.innerHTML = '<p class="text-center text-muted w-100">Belum ada foto yang dibagikan. Yuk jadi yang pertama!</p>';
                return;
            }

            // Loop dari data terbaru (paling bawah di Excel) ke yang terlama
            for(let i = data.length - 1; i > 0; i--) { 
                let rowIndex = i + 1; // Baris riil di Google Sheet
                let nama = data[i][1];
                let pesan = data[i][2];
                let fileId = data[i][3];
                let countJempol = data[i][4] || 0;
                let countLove = data[i][5] || 0;
                let countBintang = data[i][6] || 0;

                if(nama && fileId) {
                    // LINK TRICK: Menggunakan link thumbnail kecil (w=400) agar sangat hemat kuota dan load super cepat!
                    let urlThumbnail = `https://lh3.googleusercontent.com/d/${fileId}=w400`;
let urlFull = `https://lh3.googleusercontent.com/d/${fileId}`;

                    let cardHtml = `
                    <div class="gallery-item">
                        <div class="card">
                            <div class="img-container" onclick="openLightbox('${urlFull}', '${nama}')">
                                <span class="zoom-badge">🔍 Klik Ukuran Asli</span>
                                <img src="${urlThumbnail}" class="img-thumbnail-custom" alt="Foto ${nama}" loading="lazy">
                            </div>
                            <div class="card-body p-3">
                                <h5 class="card-title fw-bold mb-1 text-dark" style="font-size:1.1rem;">${nama}</h5>
                                <p class="card-text text-muted small mb-0">"${pesan}"</p>
                            </div>
                            <div class="reaction-bar">
                                <button class="reaction-btn" onclick="sendReaction(${rowIndex}, 'jempol', this)">
                                    <span>👍</span> <span class="count">${countJempol}</span>
                                </button>
                                <button class="reaction-btn" onclick="sendReaction(${rowIndex}, 'love', this)">
                                    <span>❤️</span> <span class="count">${countLove}</span>
                                </button>
                                <button class="reaction-btn" onclick="sendReaction(${rowIndex}, 'bintang', this)">
                                    <span>⭐</span> <span class="count">${countBintang}</span>
                                </button>
                            </div>
                        </div>
                    </div>`;
                    container.innerHTML += cardHtml;
                }
            }
        } catch (error) {
            status.innerHTML = '<p class="text-center text-danger">Gagal memuat galeri. Pastikan pengaturan Apps Script sudah benar.</p>';
        }
    }

    // Fungsi Pop-up Gambar Ukuran Penuh (Lightbox)
    function openLightbox(url, nama) {
        document.getElementById('lightboxImage').src = url;
        document.getElementById('lightboxCaption').innerText = "Foto Kenangan: " + nama;
        const myModal = new bootstrap.Modal(document.getElementById('lightboxModal'));
        myModal.show();
    }

    // Fungsi Kirim Reaksi Interaktif Tanpa Reload
    function sendReaction(row, type, element) {
        // Efek Instan di Layar (Ubah warna & tambah +1 secara lokal agar terasa cepat)
        const countSpan = element.querySelector('.count');
        let currentCount = parseInt(countSpan.innerText);
        countSpan.innerText = currentCount + 1;
        
        if(type === 'jempol') element.classList.add('reacted-thumb');
        if(type === 'love') element.classList.add('reacted-love');
        if(type === 'bintang') element.classList.add('reacted-star');
        
        // Kirim data ke background Google Sheets
        fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'react', row: row, type: type }),
            mode: 'no-cors'
        }).catch(err => console.log("Gagal sinkronisasi reaksi ke server."));
    }

    // Fungsi Submit Unggah Foto Baru
    document.getElementById('uploadForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const file = document.getElementById('fileFoto').files[0];
        const btnSubmit = document.getElementById('btnSubmit');
        const loadingDiv = document.getElementById('loadingDiv');
        
        if (file.size > 3145728) { 
            alert('Ukuran foto terlalu besar! Maksimal 3MB agar lancar.');
            return;
        }

        btnSubmit.style.display = 'none';
        loadingDiv.style.display = 'block';

        const reader = new FileReader();
        reader.onload = function(event) {
            const payload = {
                nama: document.getElementById('namaSiswa').value,
                pesan: document.getElementById('pesanSiswa').value,
                mimeType: file.type,
                base64: event.target.result
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload),
                mode: 'no-cors'
            }).then(() => {
                alert('Foto berhasil masuk album digital! Halaman akan direfresh.');
                window.location.reload();
            }).catch(error => {
                alert('Terjadi kendala pengiriman.');
                btnSubmit.style.style.display = 'block';
                loadingDiv.style.display = 'none';
            });
        };
        reader.readAsDataURL(file);
    });

    window.onload = loadGallery;
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
